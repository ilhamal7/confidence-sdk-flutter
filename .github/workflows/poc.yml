name: Supply Chain RCE Proof
on: [push, workflow_dispatch] 

jobs:
  simulate-developer-machine:
    runs-on: macos-latest 
    
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Simulate Official Integration Guide
        run: |
          # 1. Create a dummy project like a real dev would
          flutter create rce_test
          cd rce_test
          
          # 2. Add the package (This triggers the vulnerability)
          flutter pub add confidence_flutter_sdk
          
          # 3. Trigger CocoaPods resolution (The critical phase)
          cd ios
          pod repo update
          pod install --verbose # Di sini kita bakal liat dia narik v1.2.5 lu
          
          # 4. Trigger the Payload (Build phase)
          flutter build ios --no-codesign
